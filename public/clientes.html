<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - TrayHub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <div class="mobile-header">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </button>
        <div class="logo-text">TrayHub <span>AI</span></div>
        <div style="width: 36px;"></div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <div class="logo-text">TrayHub <span>AI</span></div>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-title">Menu Principal</div>
                <button class="nav-item" onclick="goTo('/index.html')">
                    <span class="nav-icon">📊</span> Dashboard
                </button>
                <button class="nav-item" onclick="goTo('/pedidos')">
                    <span class="nav-icon">📦</span> Pedidos
                    <span class="nav-badge" id="badgePedidos">0</span>
                </button>
                <button class="nav-item" onclick="goTo('/produtos')">
                    <span class="nav-icon">🏷️</span> Produtos
                    <span class="nav-badge" id="badgeProdutos">0</span>
                </button>
                <button class="nav-item active" onclick="goTo('/clientes')">
                    <span class="nav-icon">👥</span> Clientes
                </button>
                <button class="nav-item" onclick="goTo('/relatorios')">
                    <span class="nav-icon">📈</span> Relatórios
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">Sistema</div>
                <button class="nav-item" onclick="goTo('/conectar')">
                    <span class="nav-icon">🔌</span> Conectar Tray
                </button>
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div class="user-details">
                        <div class="user-name">Administrador</div>
                        <div class="user-role">Loja Demo</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="header">
                <div class="header-title">
                    <h1>👥 Clientes</h1>
                    <p>Gerencie sua base de clientes</p>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" class="form-input" id="searchClientes" placeholder="Buscar clientes..." oninput="filtrarClientes()">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Contato</th>
                                <th>Pedidos</th>
                                <th>Total Gasto</th>
                                <th>Última Compra</th>
                            </tr>
                        </thead>
                        <tbody id="clientesTable">
                            <tr><td colspan="5" style="text-align: center;">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- AI Agent -->
    <div class="ai-agent">
        <button class="ai-agent-toggle" onclick="toggleAgent()">🤖</button>
        <div class="ai-agent-panel" id="aiAgentPanel">
            <div class="ai-agent-header">
                <div class="ai-agent-avatar">🤖</div>
                <div class="ai-agent-info">
                    <h4>TrayBot</h4>
                    <p>Assistente de E-commerce</p>
                </div>
            </div>
            <div class="ai-agent-body" id="aiAgentBody">
                <div class="ai-message bot">
                    Olá! Sou o <strong>TrayBot</strong>. Posso ajudar com seus pedidos, estoque e vendas!
                </div>
            </div>
            <div class="ai-agent-footer">
                <input type="text" id="aiAgentInput" placeholder="Digite sua pergunta..." onkeypress="if(event.key==='Enter')sendAgentMessage()">
                <button onclick="sendAgentMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let todosClientes = [];

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function toggleAgent() {
            document.getElementById('aiAgentPanel').classList.toggle('open');
        }

        function goTo(url) {
            window.location.href = url;
        }

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `
                <div class="toast-icon">${icons[type]}</div>
                <div>
                    <div style="font-weight: 600; font-size: 0.85rem;">${title}</div>
                    <div style="font-size: 0.8rem; opacity: 0.8;">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function apiFetch(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers }
            });
            return response.json();
        }

        function formatMoney(value) {
            return 'R$ ' + value.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR');
        }

        async function loadClientes() {
            try {
                const data = await apiFetch('/api/clientes');
                todosClientes = data.clientes;
                renderClientes();
            } catch (e) {
                showToast('Erro', 'Falha ao carregar clientes', 'error');
            }
        }

        function renderClientes() {
            const search = document.getElementById('searchClientes').value.toLowerCase();
            let clientes = todosClientes;

            if (search) {
                clientes = clientes.filter(c =>
                    c.name.toLowerCase().includes(search) ||
                    c.email.toLowerCase().includes(search) ||
                    c.phone.includes(search)
                );
            }

            const html = clientes.map(c => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem;">${c.name.charAt(0)}</div>
                            <div>
                                <div style="font-weight: 600;">${c.name}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="font-size: 0.85rem;">${c.email}</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted);">${c.phone}</div>
                    </td>
                    <td><strong>${c.orders}</strong></td>
                    <td><strong style="color: var(--success);">${formatMoney(c.total_spent)}</strong></td>
                    <td>${formatDate(c.last_order)}</td>
                </tr>
            `).join('');

            document.getElementById('clientesTable').innerHTML = html || '<tr><td colspan="5" style="text-align: center; padding: 2rem;"><div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum cliente encontrado</p></div></td></tr>';
        }

        function filtrarClientes() {
            renderClientes();
        }

        async function sendAgentMessage(text) {
            const input = document.getElementById('aiAgentInput');
            const message = text || input.value;
            if (!message.trim()) return;

            const body = document.getElementById('aiAgentBody');
            body.insertAdjacentHTML('beforeend', `<div class="ai-message user">${message}</div>`);
            if (!text) input.value = '';

            const typingId = 'typing-' + Date.now();
            body.insertAdjacentHTML('beforeend', `<div class="ai-message typing" id="${typingId}"><span></span><span></span><span></span></div>`);
            body.scrollTop = body.scrollHeight;

            try {
                const response = await apiFetch('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ message })
                });
                document.getElementById(typingId)?.remove();
                body.insertAdjacentHTML('beforeend', `<div class="ai-message bot">${response.message}</div>`);
                body.scrollTop = body.scrollHeight;
            } catch (e) {
                document.getElementById(typingId)?.remove();
                body.insertAdjacentHTML('beforeend', `<div class="ai-message bot">❌ Desculpe, tive um problema!</div>`);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadClientes();
        });
    </script>
</body>
</html>
